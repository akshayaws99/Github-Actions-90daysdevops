---
name: Hello
on:
  push:
    branches: [main]

    paths:
      - '**.html'
    
jobs:
#name of the job
 greet:
 #type of runner .here it is github runner.each job runs on a runner
  runs-on: ubuntu-latest
  
  steps:
    - name: say hello to users
      run: echo "Hello Dosto"
      
    - name: say hello to username
      run: echo "Hello $USERNAME"
      
    - name: say hello to username
      run: echo "Hello $USER"
 #name of the second job   
  
 showdetails:
 #type of runner for second job
  runs-on: ubuntu-latest
  
  steps:
    - name: version of python
      run: docker --version && python --version


 
