
name: CICD
on:
  workflow_dispatch:
    inputs:
      environment:
       description: This is the env value where this workflow runs
       default: 'dev' 
       required: true
       type: choice
       options:
         - dev
         - stage
         - prod
       
      
jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "clone code from github"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    
    steps:
      - name: build docker container
        run: echo "Docker container build"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    
    steps:
      - name: testing the code
        run: echo "Testing the code"
  deploy:
    if: ${{ inputs.environment == 'dev' || inputs.environment == 'stage' }}
    needs: [test]
    runs-on: ubuntu-latest
   
    steps:
      - name: deploying the app
        run: echo " deploying the app"
